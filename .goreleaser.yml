version: 2

project_name: sendrecv

builds:
  - id: sendrecv
    main: ./cmd/sendrecv
    binary: sendrecv
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: release-archive
    ids:
      - sendrecv
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

brews:
  - name: sendrecv
    ids:
      - release-archive
    repository:
      owner: connorpink
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/connorpink/quick_send_project
    description: Repeat SSH-based file transfer between known devices
    license: MIT
    download_strategy: CurlDownloadStrategy
    skip_upload: auto
    dependencies:
      - name: rsync
      - name: xz

nfpms:
  - id: linux-packages
    package_name: sendrecv
    ids:
      - sendrecv
    formats:
      - deb
      - rpm
    homepage: https://github.com/connorpink/quick_send_project
    description: Repeat SSH-based file transfer between known devices
    license: MIT
    maintainer: Connor Pink
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/sendrecv/LICENSE

release:
  github:
    owner: connorpink
    name: quick_send_project
